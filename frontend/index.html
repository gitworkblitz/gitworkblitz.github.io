<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>WorkSphere - Services, Jobs & Gigs Platform</title>
    <meta name="description" content="Find jobs, hire workers, and book services on WorkSphere." />
    <meta name="keywords" content="WorkSphere, home services, plumber, electrician, carpenter, AC repair, jobs, gigs, freelance, India, Delhi NCR, workforce platform, hire professionals" />
    <meta name="author" content="WorkSphere" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="canonical" href="https://worksphere.me/" />

    <!-- Open Graph -->
    <meta property="og:title" content="WorkSphere — India's All-in-One Workforce Platform" />
    <meta property="og:description" content="Find trusted professionals, browse jobs, and post freelance gigs — all in one place. 20+ service categories across India." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://worksphere.me/" />
    <meta property="og:site_name" content="WorkSphere" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WorkSphere — India's All-in-One Workforce Platform" />
    <meta name="twitter:description" content="Connect with skilled professionals, find your dream job, and grow your freelance career." />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "WorkSphere",
      "url": "https://worksphere.me",
      "description": "India's all-in-one workforce platform connecting customers with verified professionals for home services, jobs, and freelance gigs.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.7",
        "reviewCount": "1200"
      },
      "areaServed": {
        "@type": "Place",
        "name": "Delhi NCR, India"
      }
    }
    </script>

    <!-- Fonts — display=swap prevents FOIT & preloading eliminates render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    <!-- Firebase & API Preconnect — eliminates DNS+TLS latency on first request -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />

    <!-- Leaflet CSS: loaded lazily by map components, NOT here (saves ~40KB blocking) -->

    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Branded skeleton loader — shown instantly before React hydrates -->
      <div id="initial-loader" style="min-height:100vh;background:#f9fafb;font-family:Inter,system-ui,sans-serif;">
        <!-- Navbar skeleton -->
        <div style="height:64px;background:#fff;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;padding:0 24px;gap:12px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);"></div>
          <div style="width:110px;height:18px;background:#e5e7eb;border-radius:8px;"></div>
          <div style="flex:1;"></div>
          <div style="width:80px;height:14px;background:#e5e7eb;border-radius:6px;"></div>
          <div style="width:80px;height:14px;background:#e5e7eb;border-radius:6px;margin-left:8px;"></div>
        </div>
        <!-- Hero skeleton -->
        <div style="background:linear-gradient(135deg,#0f172a,#1e3a8a,#1d4ed8);padding:80px 24px;text-align:center;">
          <div style="width:260px;height:16px;background:rgba(255,255,255,0.1);border-radius:20px;margin:0 auto 24px;"></div>
          <div style="width:420px;max-width:90%;height:40px;background:rgba(255,255,255,0.12);border-radius:12px;margin:0 auto 16px;"></div>
          <div style="width:320px;max-width:80%;height:20px;background:rgba(255,255,255,0.08);border-radius:8px;margin:0 auto 32px;"></div>
          <div style="display:flex;gap:16px;justify-content:center;">
            <div style="width:140px;height:48px;background:rgba(255,255,255,0.9);border-radius:12px;"></div>
            <div style="width:140px;height:48px;background:rgba(255,255,255,0.15);border-radius:12px;"></div>
          </div>
        </div>
        <!-- Content skeleton -->
        <div style="max-width:1200px;margin:40px auto;padding:0 24px;">
          <div style="width:200px;height:24px;background:#e5e7eb;border-radius:8px;margin-bottom:24px;"></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">
            <div style="height:80px;background:#fff;border-radius:12px;border:1px solid #f3f4f6;"></div>
            <div style="height:80px;background:#fff;border-radius:12px;border:1px solid #f3f4f6;"></div>
            <div style="height:80px;background:#fff;border-radius:12px;border:1px solid #f3f4f6;"></div>
            <div style="height:80px;background:#fff;border-radius:12px;border:1px solid #f3f4f6;"></div>
            <div style="height:80px;background:#fff;border-radius:12px;border:1px solid #f3f4f6;"></div>
          </div>
        </div>
      </div>
      <style>
        #initial-loader{transition:opacity .3s ease}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        #initial-loader div[style*="background:#e5e7eb"]{background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%)!important;background-size:200% 100%!important;animation:shimmer 1.5s infinite!important}
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
